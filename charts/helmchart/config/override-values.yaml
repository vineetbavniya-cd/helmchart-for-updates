replicaCount: 1

revisionHistoryLimit: 10 
progressDeadlineSeconds: 600 
minReadySeconds: 30 
paused: false 


priorityClassName: high-priority # 
terminationGracePeriodSeconds: 30 # 
dnsPolicy: ClusterFirst # 

dnsConfig: 
  enabled: true
  nameservers: # 
    - 8.8.8.8
  searches: # 
    - default.svc.cluster.local
  options: # 
    - name: ndots
      value: "2"
restartPolicy: Always # 
schedulerName: default-scheduler # 
hostNetwork: false # 
hostPID: false
hostIPC: false
shareProcessNamespace: false # 



image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"
  digest: "sha256:09369da6b10306312cd908661320086bf87fbae1b6b0c49a1f50ba531fef2eab"

secret:
  enabled: true
  secrets:
    SECRET_KEY: "secret"

configmap:
  enabled: true
  configs:
    CONFIG_KEY: "configmap"

imagePullSecrets: [] 

commands:
  - /bin/sh
  - -c
  - echo "Hello, from CloudDrove!"; nginx -g 'daemon off;'



lifecycle: 
  enabled: true
  postStart:
    exec:
      command: ["/bin/sh", "-c", "echo PostStart hook executed"]
  preStop:
    exec:
      command: ["/bin/sh", "-c", "echo PreStop hook executed && sleep 10"]


nameOverride: "" 

fullnameOverride: "" 

pdbMinAvailable: 30% 

serviceAccount:
  enabled: true  
  annotations: {}       
  name: ""
  automountServiceAccountToken: false 

podAnnotations: {} 

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    add: ["NET_ADMIN", "SYS_TIME"]
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  runAsGroup: 3000
  fsGroup: 2000

service: 
  enabled: true
  type: NodePort 
  port: 80  
  containerPort: 80
  targetPort: http

istio:
  enabled: false
  virtualService:
    enabled: false
    hosts: 
      - test.example.com
      - test-2.example.com
  gateway:
    names: 
      - "istio-system/istio-gateway"

ingress:    
  enabled: true 
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/group.name: ingress
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  hosts:                        
    - host: chart-example.local
      paths:
        - path: /*
          pathType: ImplementationSpecific
  tls: []

resource:
  enabled: true
resources: 
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:      
  enabled: true 
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

poddisruptionbudget:
  enabled: true
  minAvailable: 30%

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - key: "clouddrove"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

topologySpreadConstraints: # 
  - maxSkew: 1
    topologyKey: "topology.kubernetes.io/zone"
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: example

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: "kubernetes.io/os"
          operator: In
          values:
          - "linux" 

cronJob: 
  enabled: false
  schedule: ""
  startingDeadlineSeconds: 3600
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  resources: {}
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: "1.16.0" 
  secret:
    enabled: false
  configmap:
    enabled: false

metrics:
  enabled: false   
  portName: "prometheus" 
  port: 3001     
  targetPort: 3001 


volume:
  enabled: false
  mountPath: "/usr/share/nginx/html"
  hostPath: "/var/www/html"

storageClass:
  create: false
  existingClaim: ""
  # storageClassName: "mystorageclass"
  
  aws: false
  fileSystemId: fs-abcd1234xyz
  
  azure: false
  
  gcp: false

  provisioner: "k8s.io/minikube-hostpath"
  allowVolumeExpansion: false
  volumeBindingMode: Immediate

  persistence:
    enabled: false
    accessMode: ReadWriteOnce
    size: 512Mi
    persistentVolumeReclaimPolicy: ""

statefulSets:
  enabled: false

deploymentStrategy:
  type: Recreate

hostAliases:
  enabled: true 
  entries:
    - ip: "127.0.0.1"
      hostnames:
      - "local.example.com"